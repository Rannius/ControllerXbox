name: Kiadási biztonsági mentés

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Telepítőcsomag és GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Forrás letöltése
        uses: actions/checkout@v4

      - name: pnpm beállítása
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Függőségek telepítése
        run: pnpm install --frozen-lockfile

      - name: Frontend fordítása
        run: pnpm run build

      - name: Kiadási verzió ellenőrzése
        run: test "v$(node -p \"require('./package.json').version\")" = "${GITHUB_REF_NAME}"

      - name: Decky telepítő ZIP készítése
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          mkdir -p release
          python3 - <<'PY'
          import os
          from pathlib import Path
          import zipfile

          version = os.environ["VERSION"]
          root = Path("ControllerXbox")
          files = [
              ".gitignore",
              "LICENSE",
              "README.md",
              "main.py",
              "package.json",
              "plugin.json",
              "pnpm-lock.yaml",
              "dist/index.js",
              "dist/index.js.map",
          ]
          output = Path("release") / f"ControllerXbox-v{version}.zip"
          with zipfile.ZipFile(output, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=9) as archive:
              for relative in files:
                  info = zipfile.ZipInfo(f"{root}/{relative}")
                  info.create_system = 0
                  info.create_version = 20
                  info.extract_version = 20
                  info.flag_bits = 0
                  info.external_attr = 0
                  info.compress_type = zipfile.ZIP_DEFLATED
                  archive.writestr(info, Path(relative).read_bytes(), compress_type=zipfile.ZIP_DEFLATED, compresslevel=9)
          with zipfile.ZipFile(output) as archive:
              assert archive.namelist() == [f"{root}/{relative}" for relative in files]
              for entry in archive.infolist():
                  assert entry.compress_type == zipfile.ZIP_DEFLATED
                  assert entry.flag_bits == 0
                  assert entry.create_system == 0
                  assert entry.extract_version == 20
                  assert entry.external_attr == 0
          PY

      - name: GitHub Release létrehozása
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "release/ControllerXbox-${GITHUB_REF_NAME}.zip" \
            --title "ControllerXbox ${GITHUB_REF_NAME}" \
            --generate-notes
